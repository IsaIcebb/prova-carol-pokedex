<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokédex </title>
  <style>

  * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  text-align: center;
  min-height: 100vh;
  background: linear-gradient(
    135deg,
    #ffd6e7 0%,
    #ffffff 50%,
    #d7f5d8 100%
  );
  font-family: 'Trebuchet MS', sans-serif;
}

main {
  display: inline-block;
  margin-top: 2%;
  padding: 15px;
  position: relative;
}

.pokedex {
  width: 100%;
  max-width: 425px;

  filter:
    hue-rotate(320deg)
    saturate(0.7)
    brightness(1.15);

  filter: drop-shadow(0 8px 15px rgba(0,0,0,0.15));
}

.pokemon__image {
  position: absolute;
  bottom: 60%;
  left: 50%;
  transform: translate(-63%, 20%);
  height: 18%;
}

.pokemon__data {
  position: absolute;
  font-weight: 700;
  color: #6b5a61;
  top: 45.9%;
  right: 27%;
  font-size: clamp(8px, 5vw, 25px);
}

.pokemon__name {
  color: #79b67d;
}

.form {
  position: absolute;
  width: 65%;
  top: 55%;
  left: 13.5%;
}

.input__search {
  width: 100%;
  padding: 4%;
  outline: none;
  border: 2px solid #ffc0d8;
  border-radius: 12px;
  font-weight: 600;
  color: #6b5a61;
  font-size: clamp(8px, 5vw, 1rem);
  background-color: white;

  box-shadow:
    0 4px 10px rgba(255, 192, 216, 0.4);
}

.input__search::placeholder {
  color: #c996a9;
}

.buttons {
  position: absolute;
  bottom: 30%;
  left: 50%;
  width: 65%;
  transform: translate(-57%, 0);
  display: flex;
  gap: 20px;
}

.button {
  width: 50%;
  padding: 4%;
  border: none;
  border-radius: 12px;
  font-size: clamp(8px, 5vw, 1rem);
  font-weight: 700;
  color: white;
  cursor: pointer;
  transition: 0.3s;

  background: linear-gradient(
    135deg,
    #ffc0d8,
    #b8e6bc
  );

  box-shadow:
    0 4px 10px rgba(0,0,0,0.15);
}

.button:hover {
  transform: translateY(-3px);
}

.button:active {
  transform: scale(0.96);
}

.extra-info {
  text-align: left;
  color: #6b5a61;
  background: rgba(255,255,255,0.95);
  border: 2px solid #d7f5d8;
  border-radius: 20px;
  padding: 15px;

  margin-top: 15px;
  max-width: 425px;
  margin-left: auto;
  margin-right: auto;

  box-shadow:
    0 8px 20px rgba(0,0,0,0.08);
}

.extra-info h4 {
  color: #79b67d;
  margin-top: 8px;
}

.extra-info span {
  display: block;
  margin-bottom: 5px;
}
  </style>
</head>
<body>

  <main>
    <img src="#" alt="pokemon" class="pokemon__image" />
    <h1 class="pokemon__data">
      <span class="pokemon__number"></span> -
      <span class="pokemon__name"></span>
    </h1>

    <form class="form">
      <input
        type="search"
        class="input__search"
        placeholder="Nome ou Número"
        required
      />
    </form>

    <div class="buttons">
      <button class="button btn-prev">Anterior &lt;</button>
      <button class="button btn-next">Próximo &gt;</button>
    </div>

    <img src="./pokedex.png" alt="pokedex" class="pokedex" />

    <div class="extra-info">
      <h4>Tipo:</h4>
      <span class="pokemon__type"></span>

      <h4>Altura:</h4>
      <span class="pokemon__height"></span>

      <h4>Peso:</h4>
      <span class="pokemon__weight"></span>

      <h4>Estatísticas:</h4>
      <span class="pokemon__stats"></span>
    </div>
  </main>

  <script>
    const pokemonName = document.querySelector('.pokemon__name');
    const pokemonNumber = document.querySelector('.pokemon__number');
    const pokemonImage = document.querySelector('.pokemon__image');
    const pokemonType = document.querySelector('.pokemon__type');
    const pokemonHeight = document.querySelector('.pokemon__height');
    const pokemonWeight = document.querySelector('.pokemon__weight');
    const pokemonStats = document.querySelector('.pokemon__stats');

    const form = document.querySelector('.form');
    const input = document.querySelector('.input__search');
    const buttonPrev = document.querySelector('.btn-prev');
    const buttonNext = document.querySelector('.btn-next');

    let searchPokemon = 1;

    const fetchPokemon = async (pokemon) => {
      try {
        const APIResponse = await fetch(`https://pokeapi.co/api/v2/pokemon/${pokemon}`);

        if (APIResponse.status === 200) {
          const data = await APIResponse.json();
          return data;
        }

        throw new Error('Pokémon não encontrado');

      } catch (error) {
        console.error('Erro:', error);
        return null;
      }
    };

    const renderPokemon = async (pokemon) => {
      pokemonName.innerHTML = 'Carregando...';
      pokemonNumber.innerHTML = '';
      pokemonType.innerHTML = '';
      pokemonHeight.innerHTML = '';
      pokemonWeight.innerHTML = '';
      pokemonStats.innerHTML = '';

      const data = await fetchPokemon(pokemon);

      if (data) {
        pokemonImage.style.display = 'block';
        pokemonName.innerHTML = data.name;
        pokemonNumber.innerHTML = data.id;
        pokemonImage.src = data['sprites']['versions']['generation-v']['black-white']['animated']['front_default'];

        const types = data.types.map((type) => type.type.name).join(', ');
        pokemonType.innerHTML = types;

        pokemonHeight.innerHTML = `${data.height / 10} m`;
        pokemonWeight.innerHTML = `${data.weight / 10} kg`;

        const stats = data.stats.map((stat) => `${stat.stat.name}: ${stat.base_stat}`).join(' | ');
        pokemonStats.innerHTML = stats;

        input.value = '';
        searchPokemon = data.id;
      } else {
        pokemonImage.style.display = 'none';
        pokemonName.innerHTML = 'Não encontrado :c';
        pokemonNumber.innerHTML = '';
      }
    };

    form.addEventListener('submit', (event) => {
      event.preventDefault();
      renderPokemon(input.value.toLowerCase());
    });

    buttonPrev.addEventListener('click', () => {
      if (searchPokemon > 1) {
        searchPokemon -= 1;
        renderPokemon(searchPokemon);
      }
    });

    buttonNext.addEventListener('click', () => {
      searchPokemon += 1;
      renderPokemon(searchPokemon);
    });

    renderPokemon(searchPokemon);
  </script>
</body>
</html>
